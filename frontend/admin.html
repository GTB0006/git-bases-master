<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin - Blessed Barbershop</title>
    <link rel="stylesheet" href="/frontend/style.css">
</head>
<body style="background: #000; color: #fff; padding: 20px; font-family: sans-serif;">
    <h1 class="gold-text" style="text-align: center;">Gestión de Citas</h1>
    
    <div style="background: #1a1a1a; padding: 20px; border-radius: 10px; margin-bottom: 20px; display: flex; gap: 15px; align-items: center; justify-content: center; flex-wrap: wrap;">
        <span id="count-text" style="background: #c5a059; color: #000; padding: 8px 15px; border-radius: 20px; font-weight: bold;">Calculando...</span>
        
        <input type="date" id="filtro-fecha" onchange="filtrarTabla()" style="padding: 10px; border-radius: 5px;">
        
        <select id="filtro-barbero" onchange="filtrarTabla()" style="padding: 10px; border-radius: 5px;">
            <option value="">Todos los Barberos</option>
            <option value="Juan Camilo">Juan Camilo</option>
            <option value="Juan Sebastian">Juan Sebastian</option>
        </select>

        <button onclick="limpiarFiltro()" style="padding: 10px; background: #333; color: #fff; border: none; border-radius: 5px; cursor: pointer;">Limpiar</button>
    </div>

    <div id="status" style="text-align: center; color: #c5a059;">Validando acceso...</div>

    <table id="tabla-admin" style="display: none; width: 100%; border-collapse: collapse;">
        <thead>
            <tr style="background: #c5a059; color: #000;">
                <th style="padding: 10px;">ESTADO</th>
                <th style="padding: 10px;">CLIENTE</th>
                <th style="padding: 10px;">SERVICIO</th>
                <th style="padding: 10px;">BARBERO</th>
                <th style="padding: 10px;">FECHA</th>
                <th style="padding: 10px;">HORA</th>
                <th style="padding: 10px;">WHATSAPP</th>
            </tr>
        </thead>
        <tbody id="lista-reservas" style="text-align: center;"></tbody>
    </table>

    <script>
        let password = "";
        let todasLasReservas = [];

        async function validar() {
            password = prompt("Clave de Admin:");
            if(password === "Blessed2026") {
                document.getElementById('status').innerText = "Cargando citas...";
                document.getElementById('tabla-admin').style.display = 'table';
                await cargarDatos();
            } else {
                alert("Incorrecto");
                window.location.reload();
            }
        }

        async function cargarDatos() {
            try {
                // Hacemos la petición al backend
                const res = await fetch(`/reservas/1?token=${password}`);
                if(!res.ok) throw new Error("Error en respuesta");
                
                todasLasReservas = await res.json();
                
                document.getElementById('status').style.display = 'none';
                renderizarTabla(todasLasReservas);
            } catch(e) { 
                console.error(e);
                document.getElementById('status').innerText = "Error al conectar con el servidor";
            }
        }

        function renderizarTabla(lista) {
            const tbody = document.getElementById('lista-reservas');
            const countText = document.getElementById('count-text');
            
            // Obtenemos fecha de hoy en formato local (Colombia)
            const hoy = new Date().toLocaleDateString('en-CA'); 
            let pendientesHoy = 0;

            if (lista.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="padding:20px;">No hay citas registradas</td></tr>';
                countText.innerText = "0 Citas";
                return;
            }

            tbody.innerHTML = lista.map(r => {
                // Comparamos fecha para el estado
                const estaPasada = r.fecha < hoy;
                if (r.fecha === hoy && !estaPasada) pendientesHoy++;

                // Limpiamos el teléfono por si viene con espacios o es NULL
                const telLink = r.telefono ? r.telefono.toString().replace(/\s+/g, '') : '';

                const estiloFila = estaPasada ? 'style="color: #666; opacity: 0.6;"' : '';
                
                return `
                <tr ${estiloFila} style="border-bottom: 1px solid #333;">
                    <td style="padding: 12px;">${estaPasada ? '✅' : '⏳'}</td>
                    <td>${r.cliente || 'Invitado'}</td>
                    <td>${r.servicio || 'No especificado'}</td>
                    <td>${r.barbero}</td>
                    <td>${r.fecha}</td>
                    <td><b>${r.hora}</b></td>
                    <td>
                        ${telLink !== '0' && telLink !== '' 
                            ? `<a href="https://wa.me/${telLink}" target="_blank" style="color:#25d366; text-decoration:none; font-weight:bold;">WhatsApp</a>` 
                            : '<span style="color:#666">Sin Tel</span>'}
                    </td>
                </tr>`;
            }).join('');

            countText.innerText = `Citas hoy: ${pendientesHoy}`;
        }

        function filtrarTabla() {
            const f = document.getElementById('filtro-fecha').value;
            const b = document.getElementById('filtro-barbero').value;
            let filtradas = todasLasReservas;
            
            if (f) filtradas = filtradas.filter(r => r.fecha === f);
            if (b) filtradas = filtradas.filter(r => r.barbero === b);
            
            renderizarTabla(filtradas);
        }

        function limpiarFiltro() {
            document.getElementById('filtro-fecha').value = "";
            document.getElementById('filtro-barbero').value = "";
            renderizarTabla(todasLasReservas);
        }

        window.onload = validar;
    </script>
</body>
</html>

    </script>
