<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barbería 💈 | Reserva</title>

<style>
* {
    box-sizing: border-box;
    font-family: 'Segoe UI', Arial, sans-serif;
}

body {
    background:
        linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)),
        url("/frontend/img/fondo.jpeg") no-repeat center center fixed;
    background-size: cover;
    margin: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.app {
    width: 100%;
    max-width: 420px;
    padding: 20px;
    background: rgba(255,255,255,0.94);
}

@media (min-width: 768px) {
    .app {
        border-radius: 18px;
        box-shadow: 0 20px 50px rgba(0,0,0,.4);
    }
}

h1 {
    text-align: center;
    margin-bottom: 5px;
}

.subtitle {
    text-align: center;
    color: #6b7280;
    font-size: 14px;
    margin-bottom: 20px;
}

label {
    font-size: 13px;
    font-weight: 600;
    margin-top: 12px;
    display: block;
}

input, select {
    width: 100%;
    padding: 14px;
    margin-top: 6px;
    border-radius: 10px;
    border: 1px solid #d1d5db;
    font-size: 15px;
}

button {
    margin-top: 20px;
    width: 100%;
    padding: 15px;
    background: #111827;
    color: white;
    border: none;
    border-radius: 14px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
}

.msg {
    margin-top: 15px;
    padding: 12px;
    border-radius: 10px;
    font-size: 14px;
    text-align: center;
}

.ok {
    background: #dcfce7;
    color: #166534;
}

.error {
    background: #fee2e2;
    color: #7f1d1d;
}

.reserva {
    background: #f9fafb;
    border-radius: 10px;
    padding: 12px;
    margin-bottom: 10px;
    font-size: 14px;
}

.prof-preview {
    text-align: center;
    margin-top: 10px;
}

.prof-preview img {
    width: 90px;
    height: 90px;
    border-radius: 12px;
    object-fit: cover;
}
</style>
</head>

<body>

<div class="app">

<h1>💈 Blesseedbarbershop</h1>
<div class="subtitle">📍 Calle 38 sur 34-22 Envigado</div>

<label>Nombre</label>
<input id="nombre">

<label>Teléfono</label>
<input id="telefono">

<label>Cédula</label>
<input id="cedula">

<label>Barbero</label>
<select id="profesional" onchange="mostrarImagenProfesional()">
    <option value="">Selecciona un profesional</option>
</select>

<div class="prof-preview" id="preview"></div>

<label>Fecha</label>
<input type="date" id="fecha">

<label>Hora</label>
<input type="time" id="hora">

<button onclick="reservar()">Reservar turno</button>

<div id="mensaje"></div>

<hr>

<h3>📅 Reservas</h3>
<div id="lista"></div>

</div>

<script>

const API = window.location.origin;
let profesionales = {};

document.getElementById("fecha").min =
    new Date().toISOString().split("T")[0];

function mostrarImagenProfesional() {
    const id = document.getElementById("profesional").value;
    const preview = document.getElementById("preview");

    if (profesionales[id]) {
        preview.innerHTML =
            `<img src="/frontend/img/${profesionales[id].imagen}">`;
    } else {
        preview.innerHTML = "";
    }
}

async function cargarProfesionales() {
    const res = await fetch(`${API}/profesionales`);
    const data = await res.json();
    const select = document.getElementById("profesional");

    data.forEach(p => {
        profesionales[p.profesional_id] = p;

        const opt = document.createElement("option");
        opt.value = p.profesional_id;
        opt.textContent = p.nombre;
        select.appendChild(opt);
    });
}

async function reservar() {

    const nombre = value("nombre");
    const telefono = value("telefono");
    const cedula = value("cedula");
    const profesional = value("profesional");
    const fecha = value("fecha");
    const hora = value("hora");

    const msg = document.getElementById("mensaje");
    msg.innerHTML = "";
    msg.className = "";

    try {

        const clienteRes = await fetch(
            `${API}/clientes?nombre=${nombre}&telefono=${telefono}&cedula=${cedula}`,
            { method: "POST" }
        );

        const clienteData = await clienteRes.json();

        const params = new URLSearchParams({
            cliente_id: clienteData.cliente_id,
            profesional_id: profesional,
            fecha,
            hora
        });

        const res = await fetch(`${API}/reservas?${params}`, { method: "POST" });
        const data = await res.json();

        if (!res.ok) throw data;

        msg.className = "msg ok";
        msg.innerText = data.mensaje;

        // 🔥 AQUÍ SE ABRE WHATSAPP
        if (data.whatsapp_url) {
            window.open(data.whatsapp_url, "_blank");
        }

        cargarReservas();

    } catch (e) {
        msg.className = "msg error";
        msg.innerText = e.detail || "Error al crear reserva";
    }
}

async function cargarReservas() {
    const res = await fetch(`${API}/reservas`);
    const data = await res.json();
    const lista = document.getElementById("lista");
    lista.innerHTML = "";

    data.forEach(r => {
        lista.innerHTML += `
            <div class="reserva">
                <strong>${r.cliente}</strong><br>
                📞 ${r.telefono}<br>
                ✂️ ${r.profesional}<br>
                📅 ${r.fecha} ⏰ ${r.hora}
            </div>
        `;
    });
}

const value = id => document.getElementById(id).value;

cargarProfesionales();
cargarReservas();

</script>
</body>
</html>
