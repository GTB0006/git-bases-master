<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blessed Barbershop - Reservas</title>
    <link rel="stylesheet" href="/frontend/style.css">
</head>
<body>

    <div class="container">
        <header>
            <h1 class="gold-text">Blessed Barbershop</h1>
            <p>Agende su cita con los mejores</p>
        </header>

        <div id="contenedor-servicios" class="card-dark">
            <h3 class="gold-text">Selecciona un servicio</h3>
            <div class="lista-servicios">
                <div class="servicio-item" onclick="seleccionarServicio('Corte de cabello moderno', '35.000')">
                    <div class="info">
                        <span class="nombre">Corte de cabello moderno</span>
                        <span class="duracion">1 h</span>
                    </div>
                    <span class="precio">35.000 COP</span>
                </div>

                <div class="servicio-item" onclick="seleccionarServicio('Corte y barba moderno', '45.000')">
                    <div class="info">
                        <span class="nombre">Corte y barba moderno</span>
                        <span class="duracion">1 h</span>
                    </div>
                    <span class="precio">45.000 COP</span>
                </div>

                <div class="servicio-item" onclick="seleccionarServicio('Corte de cabello clásico', '30.000')">
                    <div class="info">
                        <span class="nombre">Corte de cabello clásico</span>
                        <span class="duracion">40 min</span>
                    </div>
                    <span class="precio">30.000 COP</span>
                </div>

                <div class="servicio-item" onclick="seleccionarServicio('Limpieza facial', '20.000')">
                    <div class="info">
                        <span class="nombre">Limpieza facial</span>
                        <span class="duracion">30 min</span>
                    </div>
                    <span class="precio">20.000 COP</span>
                </div>
            </div>
        </div>

        <div id="formulario-datos" class="card-dark" style="display: none;">
            <button class="btn-volver" onclick="volverAServicios()">⬅ Cambiar servicio</button>
            <h2 id="resumen-servicio" class="gold-text" style="margin-top:20px;"></h2>

            <div class="form-group">
                <label>Selecciona tu Barbero:</label>
                <select id="barbero_id">
                    <option value="1">Juan Sebastian</option>
                    <option value="2">Camilo</option>
                </select>
            </div>

            <div class="form-group">
                <label>Tu Nombre:</label>
                <input type="text" id="cliente_nombre" placeholder="Ej: Juan Perez">
            </div>

            <div class="form-group">
                <label>Tu Correo:</label>
                <input type="email" id="cliente_email" placeholder="ejemplo@correo.com">
            </div>

            <div class="form-group">
                <label>Fecha:</label>
                <input type="date" id="fecha">
            </div>

            <div class="form-group">
                <label>Hora:</label>
                <input type="time" id="hora">
            </div>

            <button class="btn-agendar" onclick="agendarCita()">CONFIRMAR RESERVA</button>
        </div>
    </div>

    <script src="/frontend/script.js"></script>
</body>
</html>
